<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
<title>Highway Racer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: fixed;
    width: 100%;
    height: 100%;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #fff;
    overflow: hidden;
  }
  #game-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 400px;
    padding: 8px 12px;
    background: rgba(0,0,0,0.6);
    border-radius: 8px 8px 0 0;
    border: 1px solid #333;
    border-bottom: none;
  }
  .hud-item { text-align: center; }
  .hud-label { font-size: 10px; color: #888; letter-spacing: 1px; text-transform: uppercase; }
  .hud-value { font-size: 20px; font-weight: 700; color: #fff; line-height: 1.2; }
  #speed-val { color: #f90; }
  #lives-val { color: #f44; letter-spacing: 2px; }
  canvas {
    display: block;
    border-left: 1px solid #333;
    border-right: 1px solid #333;
  }
  #touch-controls {
    display: flex;
    width: 400px;
    padding: 8px 10px;
    gap: 8px;
    background: rgba(0,0,0,0.5);
    border-radius: 0 0 8px 8px;
    border: 1px solid #333;
    border-top: 1px solid #222;
  }
  #touch-controls button {
    flex: 1;
    height: 68px;
    background: rgba(255,255,255,0.05);
    border: 1px solid #3a3a3a;
    border-radius: 8px;
    color: #666;
    font-size: 26px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    transition: background 0.08s, color 0.08s, border-color 0.08s;
  }
  #touch-controls button:active,
  #touch-controls button.pressed {
    background: rgba(255,153,0,0.18);
    border-color: #f90;
    color: #f90;
  }
  #overlay {
    position: absolute;
    top: 40px;
    left: 0;
    width: 400px;
    height: 600px;
    background: rgba(0,0,0,0.82);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    border-left: 1px solid #333;
    border-right: 1px solid #333;
  }
  #overlay h1 {
    font-size: 38px;
    font-weight: 900;
    letter-spacing: 3px;
    color: #f90;
    text-shadow: 0 0 20px rgba(255,150,0,0.5);
  }
  #overlay .subtitle {
    font-size: 13px;
    color: #888;
    letter-spacing: 1px;
  }
  #overlay .big-score {
    font-size: 52px;
    font-weight: 900;
    color: #fff;
  }
  #overlay .score-label {
    font-size: 12px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: -12px;
  }
  #overlay .high-score-line {
    font-size: 13px;
    color: #f90;
  }
  #start-btn {
    margin-top: 8px;
    padding: 14px 48px;
    background: #f90;
    color: #000;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 2px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: transform 0.1s, background 0.15s;
    text-transform: uppercase;
  }
  #start-btn:hover { background: #ffb733; transform: scale(1.04); }
  #start-btn:active { transform: scale(0.97); }
  .tip {
    font-size: 12px;
    color: #555;
    text-align: center;
    line-height: 1.7;
  }
  .tip b { color: #aaa; }
</style>
</head>
<body>
<div id="game-wrapper">
  <div id="hud">
    <div class="hud-item">
      <div class="hud-label">Score</div>
      <div class="hud-value" id="score-val">0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Speed</div>
      <div class="hud-value" id="speed-val">0 km/h</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Best</div>
      <div class="hud-value" id="best-val">0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Lives</div>
      <div class="hud-value" id="lives-val">♥♥♥</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Hitbox</div>
      <button id="hbox-btn" style="background:#1a1a2e;border:1px solid #0f4;color:#0f4;font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;cursor:pointer;letter-spacing:1px;">ON</button>
    </div>
  </div>
  <canvas id="c" width="400" height="600"></canvas>
  <div id="touch-controls">
    <button id="btn-left">&#9664;</button>
    <button id="btn-boost">&#9650;</button>
    <button id="btn-right">&#9654;</button>
  </div>

  <div id="overlay">
    <h1>HIGHWAY<br>RACER</h1>
    <p class="subtitle">DODGE TRAFFIC · SURVIVE · GO FAST</p>
    <div class="tip"><b>← →</b> or <b>A D</b> to steer &nbsp;·&nbsp; <b>↑</b> or <b>W</b> to boost<br>or use the buttons below on mobile</div>
    <button id="start-btn">START GAME</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 400, H = 600;
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('score-val');
const speedEl = document.getElementById('speed-val');
const bestEl = document.getElementById('best-val');
const livesEl = document.getElementById('lives-val');
const startBtn = document.getElementById('start-btn');

let state = 'menu'; // menu | playing | dead
let score = 0, highScore = 0, lives = 3;
let roadY = 0, baseSpeed = 2, speed = baseSpeed;
let invincible = 0;
let frameCount = 0;
let showHitboxes = true;
let boost = false; // FIX

const LANE_COUNT = 4;
const ROAD_LEFT = 40;
const ROAD_RIGHT = 360;
const ROAD_W = ROAD_RIGHT - ROAD_LEFT;
const LANE_W = ROAD_W / LANE_COUNT;
function laneX(i) { return ROAD_LEFT + LANE_W * i + LANE_W / 2; }

let player = { x: laneX(1), y: 480, w: 34, h: 56, vx: 0 };
const PLAYER_ACCEL_X = 1.8;   // sideways acceleration per frame
const PLAYER_MAX_VX = 2;       // max sideways speed
const PLAYER_FRICTION = 0.82;  // lateral friction when no key held
let cars = [];
let particles = [];
let roadMarks = [];
let sideObjs = [];

const COLORS_TRAFFIC = ['#e74c3c','#3498db','#2ecc71','#9b59b6','#1abc9c','#f39c12','#e67e22','#ecf0f1'];
function randColor() { return COLORS_TRAFFIC[Math.floor(Math.random()*COLORS_TRAFFIC.length)]; }

function makeRoadMarks() {
  roadMarks = [];
  for (let i = 0; i < 12; i++) {
    roadMarks.push({ y: i * 60, lane: Math.floor(Math.random() * (LANE_COUNT-1)) + 1 });
  }
}

const MIN_GAP = 90; // minimum pixels between cars in the same lane

function spawnCar() {
  const lane = Math.floor(Math.random() * LANE_COUNT);
  // Don't spawn if a car in the same lane is still too close to the top
  const blocked = cars.some(c => c.lane === lane && c.y < MIN_GAP);
  if (blocked) return;
  const color = randColor();
  const type = Math.random() < 0.15 ? 'truck' : 'car';
  const h = type === 'truck' ? 76 : 52 + Math.floor(Math.random()*10);
  cars.push({
    lane, x: laneX(lane) + (Math.random() - 0.5) * 24, y: -80, w: 30, h,
    color, type,
    baseSpeed: baseSpeed * (0.2 + Math.random() * 0.4),
    speed: baseSpeed * (0.2 + Math.random() * 0.4),
    wobble: 0, vx: 0, crashCooldown: 0
  });
}

function spawnSideObj() {
  const side = Math.random() < 0.5 ? 'left' : 'right';
  const x = side === 'left' ? Math.random() * 35 + 2 : ROAD_RIGHT + Math.random() * 35 + 2;
  sideObjs.push({ x, y: -20, type: Math.random() < 0.5 ? 'tree' : 'post', side });
}

function emitCrash(x, y) {
  for (let i = 0; i < 18; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 1.5 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd,
      life: 30+Math.floor(Math.random()*20),
      maxLife: 50,
      color: Math.random()<0.5 ? '#f90' : '#f44',
      r: 2+Math.random()*4
    });
  }
}

function emitSmallCrash(x, y) {
  for (let i = 0; i < 7; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 0.8 + Math.random() * 2;
    particles.push({
      x, y,
      vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd,
      life: 10 + Math.floor(Math.random()*12),
      maxLife: 22,
      color: Math.random() < 0.5 ? '#f90' : '#ccc',
      r: 1 + Math.random()*2
    });
  }
}

function resetGame() {
  score = 0; lives = 3; speed = baseSpeed; invincible = 0; frameCount = 0;
  player.lane = 1; player.x = laneX(1);
  cars = []; particles = []; sideObjs = [];
  makeRoadMarks();
  // Seed one car per lane, spaced well apart
  for (let lane = 0; lane < LANE_COUNT; lane++) {
    if (Math.random() < 0.75) {
      const color = randColor();
      const type = Math.random() < 0.15 ? 'truck' : 'car';
      const h = type === 'truck' ? 76 : 52 + Math.floor(Math.random()*10);
      const spd = baseSpeed * (0.2 + Math.random() * 0.4);
      cars.push({
        lane, x: laneX(lane),
        y: 100 + lane * 140 + Math.random() * 80,
        w: 30, h, color, type,
        baseSpeed: spd, speed: spd, wobble: 0, vx: 0, crashCooldown: 0
      });
    }
  }
}

const keys = {};
document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup',   e => { keys[e.key] = false; });

startBtn.addEventListener('click', startGame);

const hboxBtn = document.getElementById('hbox-btn');
hboxBtn.addEventListener('click', () => {
  showHitboxes = !showHitboxes;
  hboxBtn.textContent = showHitboxes ? 'ON' : 'OFF';
  hboxBtn.style.color = showHitboxes ? '#0f4' : '#666';
  hboxBtn.style.borderColor = showHitboxes ? '#0f4' : '#444';
});

function startGame() {
  resetGame();
  overlay.style.display = 'none';
  state = 'playing';
}

function showOverlay(mode) {
  overlay.style.display = 'flex';
  overlay.innerHTML = '';
  if (mode === 'gameover') {
    if (score > highScore) highScore = score;
    overlay.innerHTML = `
      <h1 style="font-size:30px;color:#f44;text-shadow:0 0 20px rgba(255,68,68,0.5)">GAME OVER</h1>
      <div class="big-score">${score}</div>
      <div class="score-label">Your Score</div>
      ${score >= highScore ? '<div class="high-score-line">🏆 New Best!</div>' : `<div class="high-score-line">Best: ${highScore}</div>`}
      <button id="start-btn" style="margin-top:16px;padding:14px 48px;background:#f90;color:#000;font-size:16px;font-weight:800;letter-spacing:2px;border:none;border-radius:6px;cursor:pointer;text-transform:uppercase;">PLAY AGAIN</button>
    `;
    document.getElementById('start-btn').addEventListener('click', startGame);
  }
}

function drawRoad() {
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#111';
  ctx.fillRect(ROAD_LEFT, 0, ROAD_W, H);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(ROAD_LEFT,0); ctx.lineTo(ROAD_LEFT,H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ROAD_RIGHT,0); ctx.lineTo(ROAD_RIGHT,H); ctx.stroke();
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = 1;
  for (let i=1;i<LANE_COUNT;i++){
    const lx = ROAD_LEFT + LANE_W*i;
    ctx.beginPath(); ctx.moveTo(lx,0); ctx.lineTo(lx,H); ctx.stroke();
  }
  roadMarks.forEach(m => {
    const lx = ROAD_LEFT + LANE_W*m.lane;
    const ry = ((m.y + roadY) % (H + 60)) - 20;
    ctx.fillStyle = '#ffff0033';
    ctx.fillRect(lx-1, ry, 2, 30);
  });
}

function drawSideObj(obj) {
  const x = obj.x, y = obj.y;
  if (obj.type === 'tree') {
    ctx.fillStyle = '#2d5a1b';
    ctx.beginPath(); ctx.arc(x, y-10, 10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#3a7a25';
    ctx.beginPath(); ctx.arc(x, y-18, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(x-2, y-4, 4, 14);
  } else {
    ctx.fillStyle = '#888';
    ctx.fillRect(x-2, y-20, 4, 20);
    ctx.fillStyle = '#ff0';
    ctx.beginPath(); ctx.arc(x, y-22, 4, 0, Math.PI*2); ctx.fill();
  }
}

function drawCar(car) {
  const x = car.x - car.w/2, y = car.y - car.h/2;
  ctx.save();
  if (car.type === 'truck') {
    ctx.fillStyle = car.color;
    ctx.beginPath();
    ctx.roundRect(x, y, car.w, car.h, 4);
    ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(x+4, y+car.h-22, car.w-8, 14);
    ctx.fillStyle = '#adf';
    ctx.fillRect(x+4, y+car.h-20, car.w-8, 8);
    ctx.fillStyle = '#ffee00';
    ctx.fillRect(x+3, y+car.h-8, 10, 5);
    ctx.fillRect(x+car.w-13, y+car.h-8, 10, 5);
    ctx.fillStyle = '#f00';
    ctx.fillRect(x+3, y, 10, 5);
    ctx.fillRect(x+car.w-13, y, 10, 5);
  } else {
    ctx.fillStyle = car.color;
    ctx.beginPath();
    ctx.roundRect(x, y, car.w, car.h-10, 3);
    ctx.fill();
    ctx.fillStyle = '#adf';
    ctx.fillRect(x+4, y+car.h-22, car.w-8, 12);
    ctx.fillStyle = '#ffee00';
    ctx.fillRect(x+3, y+car.h-5, 10, 4);
    ctx.fillRect(x+car.w-13, y+car.h-5, 10, 4);
    ctx.fillStyle = '#f00';
    ctx.fillRect(x+3, y+10, 8, 4);
    ctx.fillRect(x+car.w-11, y+10, 8, 4);
    ctx.fillStyle = '#222';
    ctx.fillRect(x+2, y+car.h-12, 8, 6);
    ctx.fillRect(x+car.w-10, y+car.h-12, 8, 6);
    ctx.fillRect(x+2, y+12, 8, 6);
    ctx.fillRect(x+car.w-10, y+12, 8, 6);
  }
  if (showHitboxes) {
    ctx.strokeStyle = '#f00';
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.75;
    ctx.strokeRect(x, car.y - car.h/2, car.w, car.h);
    ctx.globalAlpha = 0.12;
    ctx.fillStyle = '#f00';
    ctx.fillRect(x, car.y - car.h/2, car.w, car.h);
    ctx.globalAlpha = 1;
    ctx.lineWidth = 1;
  }
  ctx.restore();
}

function drawPlayer() {
  const x = player.x - player.w/2;
  const y = player.y - player.h/2;
  if (invincible > 0 && Math.floor(invincible/4) % 2 === 0) return;
  ctx.save();
  ctx.fillStyle = '#f90';
  ctx.beginPath(); ctx.roundRect(x, y+8, player.w, player.h-8, 3); ctx.fill();
  ctx.fillStyle = '#adf';
  ctx.fillRect(x+4, y+10, player.w-8, 14);
  ctx.fillStyle = '#fff';
  ctx.fillRect(x+4, y+12, player.w-8, 10);
  ctx.fillStyle = '#ffee00';
  ctx.fillRect(x+2, y+2, 10, 5);
  ctx.fillRect(x+player.w-12, y+2, 10, 5);
  ctx.fillStyle = '#f44';
  ctx.fillRect(x+2, y+player.h-6, 8, 4);
  ctx.fillRect(x+player.w-10, y+player.h-6, 8, 4);
  ctx.fillStyle = '#222';
  ctx.fillRect(x+1, y+player.h-14, 8, 7);
  ctx.fillRect(x+player.w-9, y+player.h-14, 8, 7);
  ctx.fillRect(x+1, y+10, 8, 7);
  ctx.fillRect(x+player.w-9, y+10, 8, 7);
  if (boost) {
    ctx.globalAlpha = 0.7 + Math.random()*0.3;
    const grd = ctx.createLinearGradient(player.x, y+player.h, player.x, y+player.h+30);
    grd.addColorStop(0, '#f90');
    grd.addColorStop(1, 'transparent');
    ctx.fillStyle = grd;
    ctx.fillRect(x+8, y+player.h, player.w-16, 20+Math.random()*15);
    ctx.globalAlpha = 1;
  }
  if (showHitboxes) {
    ctx.strokeStyle = '#0f4';
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.85;
    ctx.strokeRect(x, y, player.w, player.h);
    ctx.globalAlpha = 0.12;
    ctx.fillStyle = '#0f4';
    ctx.fillRect(x, y, player.w, player.h);
    ctx.globalAlpha = 1;
    ctx.lineWidth = 1;
  }
  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function resolveCarCollisions() {
  for (let i = 0; i < cars.length; i++) {
    for (let j = i + 1; j < cars.length; j++) {
      const a = cars[i], b = cars[j];
      const ox = (a.w + b.w) / 2 - Math.abs(a.x - b.x);
      const oy = (a.h + b.h) / 2 - Math.abs(a.y - b.y);
      if (ox <= 0 || oy <= 0) continue;

      const fresh = a.crashCooldown === 0 && b.crashCooldown === 0;

      if (ox < oy) {
        // Side collision — push apart laterally
        const push = ox / 2 + 0.5;
        if (a.x < b.x) { a.x -= push; b.x += push; if (fresh) { a.vx -= 1.4; b.vx += 1.4; } }
        else            { a.x += push; b.x -= push; if (fresh) { a.vx += 1.4; b.vx -= 1.4; } }
      } else {
        // Rear collision — rear car slows, front car nudges forward
        const push = oy / 2 + 0.5;
        if (a.y < b.y) {
          // a is ahead (higher on screen), b rear-ends a
          a.y -= push; b.y += push;
          if (fresh) { b.speed = Math.max(b.speed - 0.6, 0); a.speed = Math.min(a.speed + 0.2, baseSpeed); }
        } else {
          a.y += push; b.y -= push;
          if (fresh) { a.speed = Math.max(a.speed - 0.6, 0); b.speed = Math.min(b.speed + 0.2, baseSpeed); }
        }
      }
      a.x = Math.max(ROAD_LEFT + a.w/2, Math.min(ROAD_RIGHT - a.w/2, a.x));
      b.x = Math.max(ROAD_LEFT + b.w/2, Math.min(ROAD_RIGHT - b.w/2, b.x));

      if (fresh) {
        emitSmallCrash((a.x + b.x) / 2, (a.y + b.y) / 2);
        a.crashCooldown = 20;
        b.crashCooldown = 20;
      }
    }
  }
}

function update() {
  if (state !== 'playing') return;
  frameCount++;

  // W/S (or Up/Down arrows) control forward speed
  const accelUp   = keys['ArrowUp']   || keys['w'] || keys['W'];
  const accelDown = keys['ArrowDown'] || keys['s'] || keys['S'];
  boost = !!accelUp;
  if (accelUp)   speed = Math.min(speed + 0.08, 6);
  if (accelDown) speed = Math.max(speed - 0.12, 0.3);
  // Gentle coast back toward base speed when neither held
  if (!accelUp && !accelDown) speed += (baseSpeed - speed) * 0.03;
  baseSpeed = Math.min(5, 2 + score / 2000);

  roadY = (roadY + speed) % (H + 60);
  roadMarks.forEach(m => { m.y = (m.y + speed) % (H + 60); });

  // Free lateral movement — A/Left accelerate left, D/Right accelerate right
  const goLeft  = keys['ArrowLeft']  || keys['a'] || keys['A'];
  const goRight = keys['ArrowRight'] || keys['d'] || keys['D'];
  if (goLeft)  player.vx = Math.max(player.vx - PLAYER_ACCEL_X, -PLAYER_MAX_VX);
  if (goRight) player.vx = Math.min(player.vx + PLAYER_ACCEL_X,  PLAYER_MAX_VX);
  if (!goLeft && !goRight) player.vx *= PLAYER_FRICTION;
  player.x = Math.max(ROAD_LEFT + player.w/2, Math.min(ROAD_RIGHT - player.w/2, player.x + player.vx));

  if (Math.random() < 0.015 + score/50000) spawnCar();
  if (Math.random() < 0.02) spawnSideObj();

  // Move cars and apply car-following: each car checks the nearest car ahead in its lane
  cars.forEach(c => {
    c.y += speed - c.speed;
    c.x += c.vx;
    c.vx *= 0.88;
    c.x = Math.max(ROAD_LEFT + c.w/2, Math.min(ROAD_RIGHT - c.w/2, c.x));
    if (c.crashCooldown > 0) c.crashCooldown--;
  });

  // Car-following: slow down if too close to the car directly ahead in the same lane
  cars.forEach(c => {
    // Find the closest car ahead (larger y = further down screen = in front, direction of travel)
    let minGapAhead = Infinity;
    cars.forEach(other => {
      if (other === c || other.lane !== c.lane) return;
      const gap = other.y - c.y - c.h / 2 - other.h / 2;
      if (gap > -5 && gap < minGapAhead) minGapAhead = gap;
    });
    if (minGapAhead < MIN_GAP) {
      // Brake smoothly: match the car ahead's effective speed
      c.speed = Math.min(c.speed + 0.15, baseSpeed * 0.8);
    } else {
      // Accelerate back to natural speed
      c.speed = Math.max(c.speed - 0.05, c.baseSpeed);
    }
  });

  resolveCarCollisions();
  cars = cars.filter(c => c.y < H + 100);

  sideObjs.forEach(o => { o.y += speed; });
  sideObjs = sideObjs.filter(o => o.y < H + 40);

  particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.life--; p.vx*=0.95; p.vy*=0.95; });
  particles = particles.filter(p => p.life > 0);

  if (invincible > 0) invincible--;

  if (invincible === 0) {
    for (let c of cars) {
      const dx = Math.abs(player.x - c.x);
      const dy = Math.abs(player.y - c.y);
      if (dx < (player.w + c.w)/2 - 4 && dy < (player.h + c.h)/2 - 4 && c.y < player.y + player.h/2) {
        emitCrash(player.x, player.y);
        lives--;
        invincible = 90;
        updateLives();
        if (lives <= 0) {
          state = 'dead';
          setTimeout(() => showOverlay('gameover'), 600);
        }
        break;
      }
    }
  }

  score += Math.floor(speed * 0.5);
  updateHUD();
}

function updateHUD() {
  scoreEl.textContent = score;
  speedEl.textContent = Math.floor(speed * 18) + ' km/h';
  bestEl.textContent = Math.max(score, highScore);
}
function updateLives() {
  livesEl.textContent = '♥'.repeat(Math.max(0,lives)) + '♡'.repeat(Math.max(0,3-lives));
}

function render() {
  ctx.clearRect(0,0,W,H);
  drawRoad();
  sideObjs.forEach(drawSideObj);
  [...cars].sort((a, b) => a.y - b.y).forEach(drawCar);
  drawPlayer();
  drawParticles();
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

// Touch controls
(function () {
  function bind(id, key) {
    const el = document.getElementById(id);
    function press(e)   { e.preventDefault(); keys[key] = true;  el.classList.add('pressed'); }
    function release(e) { e.preventDefault(); keys[key] = false; el.classList.remove('pressed'); }
    el.addEventListener('touchstart',  press,   { passive: false });
    el.addEventListener('touchend',    release, { passive: false });
    el.addEventListener('touchcancel', release, { passive: false });
    el.addEventListener('mousedown',   press);
    el.addEventListener('mouseup',     release);
    el.addEventListener('mouseleave',  release);
  }
  bind('btn-left',  'ArrowLeft');
  bind('btn-right', 'ArrowRight');
  bind('btn-boost', 'ArrowUp');
  document.addEventListener('contextmenu', e => e.preventDefault());
  canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
})();

// Scale game to fit viewport
function scaleGame() {
  const scale = Math.min(window.innerWidth / 408, window.innerHeight / 748, 1);
  document.getElementById('game-wrapper').style.transform =
    scale < 1 ? `scale(${scale.toFixed(4)})` : '';
}
window.addEventListener('resize', scaleGame);
scaleGame();

updateLives();
makeRoadMarks();
loop();
</script>
</body>
</html>
